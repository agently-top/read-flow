version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: readflow-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data
      - ./skills:/app/skills
      - ./backend/src:/app/src:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=/app/data/readflow.db
      - FRESHRSS_URL=http://freshrss:80
      - FRESHRSS_USER=admin
      - FRESHRSS_PASSWORD=FreshRSS2026!
      - GLM_API_KEY=4ceace78eb0e4513972519c5bc2e0d64.lZnIQgJEkstQF6FF
      - ADMIN_PASSWORD=SN2008@+
      - SIYUAN_API_URL=http://host.docker.internal:6806
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - readflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: readflow-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://readflow-backend:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    networks:
      - readflow-network

networks:
  readflow-network:
    driver: bridge

volumes:
  backend-data:
